version: '3.8'

services:
  movie-recommender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-recommendation-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Persiste dados processados
      - ./data/data_processed:/app/data/data_processed
      - ./data/processed:/app/data/processed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s