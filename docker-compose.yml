version: '3.8'

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
    - "8000:8000"
    env_file: .env
    volumes:
    - ./data:/app/data
    - ./logs:/app/logs

  interface: 
    build: .
    command: streamlit run interface.py --server.port 8501 --server.address 0.0.0.0
    ports: 
    - "8501:8501"
    env_file: .env
    depends_on:
    - api
    volumes: 
    - ./data:/app/data

  movie-recommender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-recommendation-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Persiste dados processados
      - ./data/data_processed:/app/data/data_processed
      - ./data/processed:/app/data/processed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s